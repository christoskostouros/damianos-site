backend:
  name: github
  repo: christoskostouros/damianos-site
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:

  # ══════════════════════════════════════════════
  # 🏠 ΑΡΧΙΚΗ ΣΕΛΙΔΑ
  # ══════════════════════════════════════════════
  - name: "home"
    label: "🏠 Αρχική Σελίδα"
    files:
      - label: "Αρχική"
        name: "home"
        file: "src/content/pages/home.md"
        fields:
          - { label: "SEO Τίτλος (καρτέλα browser)", name: "seoTitle", widget: "string" }
          - { label: "SEO Περιγραφή (Google snippet)", name: "seoDescription", widget: "text" }
          - { label: "Hero — Κύριος Τίτλος", name: "heroTitle", widget: "string" }
          - { label: "Hero — Υπότιτλος", name: "heroSubtitle", widget: "text" }
          - { label: "About — Motto / Τίτλος", name: "aboutTitle", widget: "string" }
          - { label: "About — Κείμενο", name: "aboutText", widget: "markdown" }

  # ══════════════════════════════════════════════
  # 🏢 ΕΤΑΙΡΙΑ
  # ══════════════════════════════════════════════
  - name: "company"
    label: "🏢 Εταιρία"
    files:
      - label: "Εταιρία"
        name: "company"
        file: "src/content/pages/company.md"
        fields:
          - { label: "SEO Τίτλος", name: "seoTitle", widget: "string" }
          - { label: "SEO Περιγραφή", name: "seoDescription", widget: "text" }
          - { label: "Τίτλος Φιλοσοφίας", name: "philosophyTitle", widget: "string" }
          - { label: "Κείμενο Φιλοσοφίας", name: "philosophyText", widget: "markdown" }

  # ══════════════════════════════════════════════
  # 🧹 ΥΠΗΡΕΣΙΕΣ
  # ══════════════════════════════════════════════
  - name: "services"
    label: "🧹 Υπηρεσίες"
    files:

      # ─── 1. Καθαρισμός Χαλιών ────────────────
      - label: "1. Καθαρισμός Χαλιών"
        name: "katharismos"
        file: "src/content/pages/katharismos-xaliwn.md"
        fields:
          - { label: "SEO Τίτλος", name: "seoTitle", widget: "string" }
          - { label: "SEO Περιγραφή", name: "seoDescription", widget: "text" }
          - { label: "Τίτλος Σελίδας (H1)", name: "pageTitle", widget: "string" }
          - { label: "Υπότιτλος", name: "heroSubtitle", widget: "text" }
          - { label: "Εισαγωγικό Κείμενο", name: "introText", widget: "markdown" }
          - { label: "⚙️ Βήμα 1 — Σαπούνισμα", name: "step1", widget: "text" }
          - { label: "⚙️ Βήμα 2 — Τρίψιμο", name: "step2", widget: "text" }
          - { label: "⚙️ Βήμα 3 — Ξέβγαλμα", name: "step3", widget: "text" }
          - { label: "⚙️ Βήμα 4 — Κρόσια", name: "step4", widget: "text" }
          - { label: "⚙️ Βήμα 5 — Στύψιμο", name: "step5", widget: "text" }
          - { label: "⚙️ Βήμα 6 — Στέγνωμα", name: "step6", widget: "text" }
          - { label: "🏷️ Ετικέτα Κάρτας Τιμής (π.χ. Προσφορά)", name: "badgeLabel", widget: "string" }
          - { label: "🏷️ Τιμή από (€/τ.μ.)", name: "priceFrom", widget: "string" }
          - { label: "🏷️ Σημείωση ΦΠΑ", name: "priceNote", widget: "string" }

      # ─── 2. Φύλαξη Ταπήτων ───────────────────
      - label: "2. Φύλαξη Ταπήτων"
        name: "fylaksi"
        file: "src/content/pages/fylaksi-tapiton.md"
        fields:
          - { label: "SEO Τίτλος", name: "seoTitle", widget: "string" }
          - { label: "SEO Περιγραφή", name: "seoDescription", widget: "text" }
          - { label: "Τίτλος Σελίδας (H1)", name: "pageTitle", widget: "string" }
          - { label: "Υπότιτλος", name: "heroSubtitle", widget: "text" }
          - { label: "Εισαγωγικό Κείμενο", name: "introText", widget: "markdown" }
          - { label: "Σημείωση Δωρεάν Φύλαξης", name: "freeStorageNote", widget: "text" }
          - { label: "Σημείωση Μετά 31/12", name: "afterDateNote", widget: "text" }

      # ─── 3. Επισκευές Χαλιών ─────────────────
      - label: "3. Επισκευές Χαλιών"
        name: "episkeves"
        file: "src/content/pages/episkeves-xalion.md"
        fields:
          - { label: "SEO Τίτλος", name: "seoTitle", widget: "string" }
          - { label: "SEO Περιγραφή", name: "seoDescription", widget: "text" }
          - { label: "Τίτλος Σελίδας (H1)", name: "pageTitle", widget: "string" }
          - { label: "Υπότιτλος", name: "heroSubtitle", widget: "text" }
          - { label: "Εισαγωγικό Κείμενο", name: "introText", widget: "markdown" }
          - { label: "Λίστα — Μηχανοποίητα Χαλιά", name: "machineRepairsList", widget: "markdown" }
          - { label: "Λίστα — Χειροποίητα Χαλιά", name: "handmadeRepairsList", widget: "markdown" }

      # ─── 4. Παραλαβή & Παράδοση ──────────────
      - label: "4. Παραλαβή & Παράδοση"
        name: "paralavi"
        file: "src/content/pages/paralavi-paradosi.md"
        fields:
          - { label: "SEO Τίτλος", name: "seoTitle", widget: "string" }
          - { label: "SEO Περιγραφή", name: "seoDescription", widget: "text" }
          - { label: "Τίτλος Σελίδας (H1)", name: "pageTitle", widget: "string" }
          - { label: "Υπότιτλος", name: "heroSubtitle", widget: "text" }
          - { label: "Εισαγωγικό Κείμενο", name: "introText", widget: "markdown" }
          - { label: "🟢 Υψηλή Κίνηση — Περίοδος", name: "highSeasonPeriod", widget: "string" }
          - { label: "🟢 Υψηλή Κίνηση — Κείμενο", name: "highSeasonText", widget: "text" }
          - { label: "🟡 Χαμηλή Κίνηση — Περίοδος", name: "lowSeasonPeriod", widget: "string" }
          - { label: "🟡 Χαμηλή Κίνηση — Κείμενο", name: "lowSeasonText", widget: "text" }

      # ─── 5. Παπλώματα & Κουβέρτες ────────────
      - label: "5. Πλύσιμο Παπλωμάτων & Κουβερτών"
        name: "paplomata"
        file: "src/content/pages/plysimo-paplomaton.md"
        fields:
          - { label: "SEO Τίτλος", name: "seoTitle", widget: "string" }
          - { label: "SEO Περιγραφή", name: "seoDescription", widget: "text" }
          - { label: "Τίτλος Σελίδας (H1)", name: "pageTitle", widget: "string" }
          - { label: "Υπότιτλος", name: "heroSubtitle", widget: "text" }
          - { label: "Εισαγωγικό Κείμενο", name: "introText", widget: "markdown" }
          - { label: "Δεύτερη Παράγραφος", name: "secondParagraph", widget: "markdown" }
          - { label: "🏷️ Τιμή Κουβέρτας (€/τεμ.)", name: "priceBlanket", widget: "string" }
          - { label: "🏷️ Τιμή Παπλώματος (€/τεμ.)", name: "priceDuvet", widget: "string" }

  # ══════════════════════════════════════════════
  # 🏷️ ΠΡΟΣΦΟΡΕΣ
  # ══════════════════════════════════════════════
  - name: "offers"
    label: "🏷️ Προσφορές"
    files:
      - label: "Προσφορές"
        name: "offers"
        file: "src/content/pages/offers.md"
        fields:
          - { label: "SEO Τίτλος", name: "seoTitle", widget: "string" }
          - { label: "SEO Περιγραφή", name: "seoDescription", widget: "text" }
          - { label: "Τιμή Χαλιών — από (€/τ.μ.)", name: "priceRug", widget: "string" }
          - { label: "Τιμή Κουβέρτας (€/τεμ.)", name: "priceBlanket", widget: "string" }
          - { label: "Τιμή Παπλώματος (€/τεμ.)", name: "priceDuvet", widget: "string" }
          - { label: "Επιπλέον κείμενο", name: "offerText", widget: "markdown" }

  # ══════════════════════════════════════════════
  # ❓ ΣΥΧΝΕΣ ΕΡΩΤΗΣΕΙΣ
  # ══════════════════════════════════════════════
  - name: "faq"
    label: "❓ Συχνές Ερωτήσεις"
    folder: "src/content/faq"
    create: true
    slug: "{{order}}-{{slug}}"
    summary: "{{order}}. {{question}}"
    sortable_fields: ["order"]
    fields:
      - { label: "Ερώτηση", name: "question", widget: "string" }
      - { label: "Απάντηση", name: "answer", widget: "markdown" }
      - { label: "Σειρά Εμφάνισης (1, 2, 3...)", name: "order", widget: "number", default: 1, value_type: "int" }

  # ══════════════════════════════════════════════
  # 🖼️ ΕΙΚΟΝΕΣ — ΑΝΑ ΘΕΣΗ
  # ══════════════════════════════════════════════
  - name: "images"
    label: "🖼️ Εικόνες Σελίδων"
    files:

      - label: "Εικόνες Αρχικής Σελίδας"
        name: "images_home"
        file: "src/content/images/home-images.md"
        fields:
          - { label: "Hero — Φόντο Αρχικής (1920x600px, οριζόντια)", name: "heroImage", widget: "image", required: false, hint: "Η μεγάλη εικόνα που φαίνεται μόλις ανοίξει η αρχική σελίδα" }
          - { label: "About — Φωτογραφία δεξιά (600x600px, τετράγωνη)", name: "aboutImage", widget: "image", required: false, hint: "Εμφανίζεται δίπλα στο κείμενο 'Είναι καθαρά... στο χέρι μας'" }
          - { label: "Πριν/Μετά — ΠΡΙΝ εικόνα 1 (800x800px)", name: "beforeImage1", widget: "image", required: false, hint: "Αριστερή εικόνα στο 1ο ζεύγος σύγκρισης" }
          - { label: "Πριν/Μετά — ΜΕΤΑ εικόνα 1 (800x800px)", name: "afterImage1", widget: "image", required: false, hint: "Δεξιά εικόνα στο 1ο ζεύγος σύγκρισης" }
          - { label: "Πριν/Μετά — ΠΡΙΝ εικόνα 2 (800x800px)", name: "beforeImage2", widget: "image", required: false, hint: "Αριστερή εικόνα στο 2ο ζεύγος σύγκρισης" }
          - { label: "Πριν/Μετά — ΜΕΤΑ εικόνα 2 (800x800px)", name: "afterImage2", widget: "image", required: false, hint: "Δεξιά εικόνα στο 2ο ζεύγος σύγκρισης" }

      - label: "Εικόνες Καθαρισμού Χαλιών"
        name: "images_katharismos"
        file: "src/content/images/katharismos-images.md"
        fields:
          - { label: "Hero Banner — φόντο σελίδας (1920x600px)", name: "heroImage", widget: "image", required: false, hint: "Φόντο στο πάνω μέρος της σελίδας Καθαρισμός Χαλιών" }
          - { label: "Γκαλερί — Φωτογραφία 1", name: "processImage1", widget: "image", required: false, hint: "1η φωτο στη γκαλερί της διαδικασίας καθαρισμού" }
          - { label: "Γκαλερί — Φωτογραφία 2", name: "processImage2", widget: "image", required: false }
          - { label: "Γκαλερί — Φωτογραφία 3", name: "processImage3", widget: "image", required: false }
          - { label: "Γκαλερί — Φωτογραφία 4", name: "processImage4", widget: "image", required: false }

      - label: "Εικόνες Εταιρίας"
        name: "images_company"
        file: "src/content/images/company-images.md"
        fields:
          - { label: "Κύρια Φωτογραφία (δίπλα στη Φιλοσοφία)", name: "mainImage", widget: "image", required: false, hint: "Εμφανίζεται δεξιά στο section Φιλοσοφία στη σελίδα Εταιρία" }
          - { label: "TUV — Εικόνα Section", name: "tuvImage", widget: "image", required: false, hint: "Εικόνα που εμφανίζεται στο TUV Πιστοποίηση section" }
